syntax = "proto3";

package planner.v1;

import "google/protobuf/timestamp.proto";

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum SessionStatus {
  SESSION_STATUS_UNSPECIFIED = 0;
  SESSION_STATUS_DRAFT = 1;
  SESSION_STATUS_POLLING = 2;
  SESSION_STATUS_CONFIRMED = 3;
}

// -----------------------------------------------------------------------------
// Core Messages
// -----------------------------------------------------------------------------

message Session {
  string id = 1;
  string campaign_id = 2;
  string title = 3;
  optional string description = 4;
  SessionStatus status = 5;
  optional google.protobuf.Timestamp starts_at = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional string poll_id = 9;
  optional google.protobuf.Timestamp announced_at = 10;
  optional string series_id = 11;
  optional google.protobuf.Timestamp original_starts_at = 12;
  optional string discord_event_id = 13;
}

// -----------------------------------------------------------------------------
// RPC Messages
// -----------------------------------------------------------------------------

message AnnounceSessionRequest {
  string campaign_id = 1;
  string session_id = 2;
}

message AnnounceSessionResponse {}

message CreateSessionRequest {
  string campaign_id = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp starts_at = 3;
  SessionStatus status = 4;
  string title = 5;
  optional string series_id = 6;
  optional google.protobuf.Timestamp original_starts_at = 7;
}

message PollAnswer {
  string text = 1;
  uint32 vote_count = 2;
}

message Poll {
  string question = 1;
  repeated PollAnswer answers = 2;
  bool is_finalized = 3;
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  string id = 1;
  string campaign_id = 2;
}

message GetSessionResponse {
  Session session = 1;
}

message GetSessionPollRequest {
  string session_id = 1;
  string campaign_id = 2;
}

message GetSessionPollResponse {
  Poll poll = 1;
}

message ListSessionsByCampaignRequest {
  string campaign_id = 1;
}

message ListSessionsByCampaignResponse {
  repeated Session sessions = 1;
}

message PollSessionRequest {
  string campaign_id = 1;
  string session_id = 2;
  repeated google.protobuf.Timestamp options = 3;
}

message PollSessionResponse {}

message RemoveSessionRequest {
  string id = 1;
  string campaign_id = 2;
}
message RemoveSessionResponse {}

message UpdateSessionRequest {
  string id = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp starts_at = 3;
  SessionStatus status = 4;
  optional string title = 5;
  string campaign_id = 6;
}

message UpdateSessionResponse {
  Session session = 1;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service SessionService {
  rpc AnnounceSession(AnnounceSessionRequest) returns (AnnounceSessionResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc GetSessionPoll(GetSessionPollRequest) returns (GetSessionPollResponse);
  rpc ListSessionsByCampaign(ListSessionsByCampaignRequest) returns (ListSessionsByCampaignResponse);
  rpc PollSession(PollSessionRequest) returns (PollSessionResponse);
  rpc RemoveSession(RemoveSessionRequest) returns (RemoveSessionResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);
}
