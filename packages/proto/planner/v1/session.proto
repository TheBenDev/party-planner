syntax = "proto3";

package planner.v1;

import "google/protobuf/timestamp.proto";

// -----------------------------------------------------------------------------
// Core Messages
// -----------------------------------------------------------------------------

message Session {
  string id = 1;
  string campaign_id = 2;
  string title = 3;
  optional string description = 4;
  google.protobuf.Timestamp starts_at = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional string series_id = 11;
  optional string recap = 14;
  int32 duration_minutes = 15;
}

message PollAnswer {
  string text = 1;
  uint32 vote_count = 2;
}

message Poll {
  string question = 1;
  repeated PollAnswer answers = 2;
  bool is_finalized = 3;
}

// -----------------------------------------------------------------------------
// RPC Messages
// -----------------------------------------------------------------------------

message CreateSessionRequest {
  string campaign_id = 1;
  optional string description = 2;
  optional google.protobuf.Timestamp starts_at = 3;
  string title = 5;
  optional string series_id = 6;
  optional int32 duration_minutes = 8;
}

message CreateSessionResponse {
  Session session = 1;
}

message GetSessionRequest {
  string id = 1;
  string campaign_id = 2;
}

message GetSessionResponse {
  Session session = 1;
}

message RemoveSessionRequest {
  string id = 1;
  string campaign_id = 2;
}
message RemoveSessionResponse {}

message UpdateSessionRequest {
  string id = 1;
  optional string description = 2;
  optional string title = 5;
  string campaign_id = 6;
  optional string recap = 7;
}

message UpdateSessionResponse {
  Session session = 1;
}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service SessionService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);
  rpc RemoveSession(RemoveSessionRequest) returns (RemoveSessionResponse);
  rpc UpdateSession(UpdateSessionRequest) returns (UpdateSessionResponse);
}
