syntax = "proto3";

package planner.v1;

import "google/protobuf/timestamp.proto";
import "planner/v1/campaign.proto";
import "planner/v1/member.proto";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc GetAuth(GetAuthRequest) returns (GetAuthResponse);
}

message User {
  string id = 1;
  string email = 2;
  string external_id = 3;
  optional string avatar = 4;
  optional string first_name = 5;
  optional string last_name = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional google.protobuf.Timestamp deleted_at = 9;
}

message GetAuthRequest {
  string clerk_id = 1;
  optional string campaign_id = 2;
}
message GetAuthResponse {
  User user = 1;
  optional Campaign campaign = 2;
  optional MemberRole role = 3;
}

message CreateUserRequest {
  string email = 1;
  string external_id = 2;
  optional string avatar = 3;
  optional string first_name = 4;
  optional string last_name = 5;
}

message CreateUserResponse {
  User user = 1;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByEmailResponse {
  User user = 1;
}

// TODO: make get use id not clerk id
message GetUserRequest {
  string external_id = 1;
}

message GetUserResponse {
  User user = 1;
}
