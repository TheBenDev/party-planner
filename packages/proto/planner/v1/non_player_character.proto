syntax = "proto3";
package planner.v1;

import "google/protobuf/timestamp.proto";

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum CharacterStatus {
  CHARACTER_STATUS_UNSPECIFIED = 0;
  CHARACTER_STATUS_UNKNOWN = 1;
  CHARACTER_STATUS_ALIVE = 2;
  CHARACTER_STATUS_DEAD = 3;
  CHARACTER_STATUS_MISSING = 4;
}

enum RelationToParty {
  RELATION_TO_PARTY_UNSPECIFIED = 0;
  RELATION_TO_PARTY_UNKNOWN = 1;
  RELATION_TO_PARTY_ALLY = 2;
  RELATION_TO_PARTY_ENEMY = 3;
  RELATION_TO_PARTY_NEUTRAL = 4;
  RELATION_TO_PARTY_SUSPICIOUS = 5;
}

enum HealthCondition {
  HEALTH_CONDITION_UNSPECIFIED = 0;
  HEALTH_CONDITION_UNKNOWN = 1;
  HEALTH_CONDITION_HEALTHY = 2;
  HEALTH_CONDITION_SICK = 3;
  HEALTH_CONDITION_INJURED = 4;
  HEALTH_CONDITION_DEAD = 5;
}

// -----------------------------------------------------------------------------
// Core Messages
// -----------------------------------------------------------------------------

message Npc {
  string id = 1;
  string campaign_id = 2;
  string name = 3;
  CharacterStatus status = 4;
  RelationToParty relation_to_party_status = 5;
  bool is_known_to_party = 6;
  optional string age = 7;
  optional string appearance = 8;
  optional string avatar = 9;
  optional string backstory = 10;
  optional string dm_notes = 11;
  optional string foundry_actor_id = 12;
  optional string known_name = 13;
  optional string personality = 14;
  optional string player_notes = 15;
  optional string race = 16;
  optional string current_location_id = 17;
  optional string origin_location_id = 18;
  optional string session_encountered_id = 19;
  repeated string aliases = 20;
  optional google.protobuf.Timestamp last_foundry_sync_at = 21;
  google.protobuf.Timestamp created_at = 22;
  google.protobuf.Timestamp updated_at = 23;
  HealthCondition health_condition = 24;
  repeated string labels = 25;
  optional int32 level = 26;
  optional string role = 27;
  optional string character_class = 28;
  optional string colony_id = 29;
  optional string workforce_id = 30;
}

// -----------------------------------------------------------------------------
// RPC Messages
// -----------------------------------------------------------------------------

message CreateNpcRequest {
  string campaign_id = 1;
  string name = 2;
  CharacterStatus status = 3;
  RelationToParty relation_to_party_status = 4;
  bool is_known_to_party = 5;
  optional string age = 6;
  optional string appearance = 7;
  optional string avatar = 8;
  optional string backstory = 9;
  optional string dm_notes = 10;
  optional string known_name = 11;
  optional string personality = 12;
  optional string player_notes = 13;
  optional string race = 14;
  optional string current_location_id = 15;
  optional string origin_location_id = 16;
  optional string session_encountered_id = 17;
  repeated string aliases = 18;
  optional string foundry_actor_id = 19;
  HealthCondition health_condition = 20;
  repeated string labels = 21;
  optional int32 level = 22;
  optional string role = 23;
  optional string character_class = 24;
  optional string colony_id = 25;
  optional string workforce_id = 26;
}

message CreateNpcResponse {
  Npc npc = 1;
}

message GetNpcRequest {
  string id = 1;
  string campaign_id = 2;
}

message GetNpcResponse {
  Npc npc = 1;
}

message ListNpcsByCampaignRequest {
  string campaign_id = 1;
}

message ListNpcsByCampaignResponse {
  repeated Npc npcs = 1;
}

message UpdateNpcRequest {
  string id = 1;
  optional string name = 2;
  optional CharacterStatus status = 3;
  optional RelationToParty relation_to_party_status = 4;
  optional bool is_known_to_party = 5;
  optional string age = 6;
  optional string appearance = 7;
  optional string avatar = 8;
  optional string backstory = 9;
  optional string dm_notes = 10;
  optional string foundry_actor_id = 11;
  optional string known_name = 12;
  optional string personality = 13;
  optional string player_notes = 14;
  optional string race = 15;
  optional string current_location_id = 16;
  optional string origin_location_id = 17;
  optional string session_encountered_id = 18;
  repeated string aliases = 19;
  string campaign_id = 20;
  optional HealthCondition health_condition = 21;
  repeated string labels = 22;
  optional int32 level = 23;
  optional string role = 24;
  optional string character_class = 25;
  repeated string removed_fields = 26;
  optional string colony_id = 27;
  optional string workforce_id = 28;
}

message UpdateNpcResponse {
  Npc npc = 1;
}

message RemoveNpcRequest {
  string id = 1;
  string campaign_id = 2;
}

message RemoveNpcResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service NonPlayerCharacterService {
  rpc CreateNpc(CreateNpcRequest) returns (CreateNpcResponse);
  rpc GetNpc(GetNpcRequest) returns (GetNpcResponse);
  rpc ListNpcsByCampaign(ListNpcsByCampaignRequest) returns (ListNpcsByCampaignResponse);
  rpc UpdateNpc(UpdateNpcRequest) returns (UpdateNpcResponse);
  rpc RemoveNpc(RemoveNpcRequest) returns (RemoveNpcResponse);
}
