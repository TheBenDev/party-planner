syntax = "proto3";

package planner.v1;

import "google/protobuf/timestamp.proto";

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum QuestStatus {
  QUEST_STATUS_UNSPECIFIED = 0;
  QUEST_STATUS_ACTIVE = 1;
  QUEST_STATUS_COMPLETED = 2;
  QUEST_STATUS_FAILED = 3;
}

enum QuestType {
  QUEST_TYPE_UNSPECIFIED = 0;
  QUEST_TYPE_MAINLAND = 1;
  QUEST_TYPE_COLONY = 2;
}

// -----------------------------------------------------------------------------
// Reward Messages
// -----------------------------------------------------------------------------

message QuestRewardColony {
  optional int32 gold = 1;
  optional int32 food = 2;
  optional int32 building_materials = 3;
  optional int32 colonist_count = 4;
  optional int32 morale = 5;
}

message QuestRewardLootItem {
  string name = 1;
  optional int32 quantity = 2;
  optional string description = 3;
}

message QuestReward {
  optional QuestRewardColony colony = 1;
  repeated QuestRewardLootItem loot = 2;
}

// -----------------------------------------------------------------------------
// Core Messages
// -----------------------------------------------------------------------------

message Quest {
  string id = 1;
  string campaign_id = 2;
  string title = 3;
  QuestStatus status = 4;
  optional string description = 5;
  optional string quest_giver_id = 6;
  optional QuestReward reward = 7;
  optional google.protobuf.Timestamp completed_at = 8;
  optional google.protobuf.Timestamp deleted_at = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  optional QuestType type = 12;
}

// -----------------------------------------------------------------------------
// RPC Messages
// -----------------------------------------------------------------------------

message CreateQuestRequest {
  string campaign_id = 1;
  string title = 2;
  QuestStatus status = 3;
  optional string description = 4;
  optional string quest_giver_id = 5;
  optional QuestReward reward = 6;
  optional QuestType type = 7;
}

message CreateQuestResponse {
  Quest quest = 1;
}

message GetQuestRequest {
  string id = 1;
  string campaign_id = 2;
}

message GetQuestResponse {
  Quest quest = 1;
}

message ListQuestsByCampaignRequest {
  string campaign_id = 1;
}

message ListQuestsByCampaignResponse {
  repeated Quest quests = 1;
}

message UpdateQuestRequest {
  string id = 1;
  optional string title = 2;
  optional QuestStatus status = 3;
  optional string description = 4;
  string campaign_id = 5;
  optional QuestType type = 6;
  optional QuestReward reward = 7;
}

message UpdateQuestResponse {
  Quest quest = 1;
}

message CompleteQuestRequest {
  string id = 1;
  string campaign_id = 2;
}

message CompleteQuestResponse {
  Quest quest = 1;
}

message RemoveQuestRequest {
  string id = 1;
  string campaign_id = 2;
}

message RemoveQuestResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service QuestService {
  rpc CreateQuest(CreateQuestRequest) returns (CreateQuestResponse);
  rpc GetQuest(GetQuestRequest) returns (GetQuestResponse);
  rpc ListQuestsByCampaign(ListQuestsByCampaignRequest) returns (ListQuestsByCampaignResponse);
  rpc UpdateQuest(UpdateQuestRequest) returns (UpdateQuestResponse);
  rpc CompleteQuest(CompleteQuestRequest) returns (CompleteQuestResponse);
  rpc RemoveQuest(RemoveQuestRequest) returns (RemoveQuestResponse);
}
