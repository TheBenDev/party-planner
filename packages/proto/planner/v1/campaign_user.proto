syntax = "proto3";

package planner.v1;

import "google/protobuf/timestamp.proto";

service CampaignUserService {
  rpc AddCampaignUser(AddCampaignUserRequest) returns (AddCampaignUserResponse);
  rpc GetCampaignUser(GetCampaignUserRequest) returns (GetCampaignUserResponse);
  rpc UpdateCampaignUserRole(UpdateCampaignUserRoleRequest) returns (UpdateCampaignUserRoleResponse);
  rpc RemoveCampaignUser(RemoveCampaignUserRequest) returns (RemoveCampaignUserResponse);
}

enum CampaignUserRole {
  CAMPAIGN_USER_ROLE_UNSPECIFIED = 0;
  CAMPAIGN_USER_ROLE_PLAYER = 1;
  CAMPAIGN_USER_ROLE_GAME_MASTER = 2;
}

message CampaignUser {
  string campaign_id = 1;
  string user_id = 2;
  CampaignUserRole role = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message AddCampaignUserRequest {
  string campaign_id = 1;
  string user_id = 2;
  CampaignUserRole role = 3;
}

message AddCampaignUserResponse {
  CampaignUser campaign_user = 1;
}

message GetCampaignUserRequest {
  string campaign_id = 1;
  string user_id = 2;
}

message GetCampaignUserResponse {
  CampaignUser campaign_user = 1;
}

message UpdateCampaignUserRoleRequest {
  string campaign_id = 1;
  string user_id = 2;
  CampaignUserRole role = 3;
}

message UpdateCampaignUserRoleResponse {
  CampaignUser campaign_user = 1;
}

message RemoveCampaignUserRequest {
  string campaign_id = 1;
  string user_id = 2;
}

message RemoveCampaignUserResponse {}
