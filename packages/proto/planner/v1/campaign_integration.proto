syntax = "proto3";

package planner.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// -----------------------------------------------------------------------------
// Enums
// -----------------------------------------------------------------------------

enum IntegrationSource {
  INTEGRATION_SOURCE_UNSPECIFIED = 0;
  INTEGRATION_SOURCE_DISCORD = 1;
}

// -----------------------------------------------------------------------------
// Core Messages
// -----------------------------------------------------------------------------

message CampaignIntegration {
  string id = 1;
  string campaign_id = 2;
  string external_id = 3;
  IntegrationSource source = 4;
  google.protobuf.Struct metadata = 5;
  google.protobuf.Struct settings = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// -----------------------------------------------------------------------------
// RPC Messages
// -----------------------------------------------------------------------------

message CreateCampaignIntegrationRequest {
  string campaign_id = 1;
  string external_id = 2;
  IntegrationSource source = 3;
  google.protobuf.Struct metadata = 4;
  google.protobuf.Struct settings = 5;
}

message CreateCampaignIntegrationResponse {
  CampaignIntegration integration = 1;
}

message GetCampaignIntegrationRequest {
  string campaign_id = 1;
  IntegrationSource source = 2;
}

message GetCampaignIntegrationResponse {
  CampaignIntegration integration = 1;
}

message RemoveCampaignIntegrationRequest {
  string campaign_id = 1;
  IntegrationSource source = 2;
}

message RemoveCampaignIntegrationResponse {}

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service CampaignIntegrationService {
  rpc CreateCampaignIntegration(CreateCampaignIntegrationRequest) returns (CreateCampaignIntegrationResponse);
  rpc GetCampaignIntegration(GetCampaignIntegrationRequest) returns (GetCampaignIntegrationResponse);
  rpc RemoveCampaignIntegration(RemoveCampaignIntegrationRequest) returns (RemoveCampaignIntegrationResponse);
}
