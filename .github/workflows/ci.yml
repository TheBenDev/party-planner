name: CI
on:
  workflow_dispatch:
  pull_request:
permissions:
  actions: read
  contents: read
env:
  BUN_VERSION: "1.3"
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
          cache: "bun"
      - run: bun install --frozen-lockfile
      - run: bun nx run-many -t lint test build
