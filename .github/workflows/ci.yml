name: CI
on:
  workflow_dispatch:
  pull_request:
permissions:
  actions: read
  contents: read
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.changes.outputs.js }}
      api: ${{ steps.changes.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            js:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
              - 'biome.json'
              - 'nx.json'
            api:
              - 'apps/api/**'
              - 'packages/proto/**'
  ci-js:
    needs: detect-changes
    if: needs.detect-changes.outputs.js == 'true'
    strategy:
      matrix:
        target: [lint, test, build, typecheck]
    runs-on: ubuntu-latest
    environment: party-planner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
          cache: "bun"
      - run: bun install --frozen-lockfile
      - name: Build packages
        if: matrix.target == 'typecheck' || matrix.target == 'build'
        run: bun run build:packages
      - run: bun nx affected -t ${{ matrix.target }} --base=origin/main --head=HEAD
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  ci-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    environment: party-planner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint
        run: cd apps/api && make lint
      - name: Test
        run: cd apps/api && make test
      - name: Build
        run: cd apps/api && make build

  deploy-staging:
    needs: [ci-js, ci-api]
    if: always() && !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    strategy:
      matrix:
        service: [party-planner-web, party-planner-api]
    runs-on: ubuntu-latest
    environment: party-planner-staging
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install Railway CLI
        run: bun add -g @railway/cli
      - name: Deploy to Staging
        run: railway up --service ${{ matrix.service }} --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
